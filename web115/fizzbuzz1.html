<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/default.css">
    <link rel="stylesheet" href="../styles/fizzbuzz1.css">
    <link rel="icon" type="image/x-icon" href="../images/favicon-32x32.png">
    <title>FizzBuzz1</title>
</head>
<body>
<div data-include="../components/header.html"></div>

<main>
<h2 class="pgtxt">FizzBuzz 1</h2>
<section class="fizz-container">
        <div class="controls">
            <div class="input-group">
                <label>Range</label>
                <input type="number" id="limit" value="140">
            </div>
            <div class="input-group">
                <label>Divisor A</label>
                <input type="number" id="div1" value="3">
            </div>
            <div class="input-group">
                <label>Word A</label>
                <input type="text" id="word1" value="EEK!">
            </div>
            <div class="input-group">
                <label>Divisor B</label>
                <input type="number" id="div2" value="5">
            </div>
            <div class="input-group">
                <label>Word B</label>
                <input type="text" id="word2" value="SCREAM!">
            </div>
            <button class="btn-generate" onclick="generateFizzBuzz()">Run Script</button>
        </div>

        <ul id="outputList">
            </ul>
    </section>
</main>

<div data-include="../components/footer.html"></div>
<script src="../scripts/fb1.js"></script>
<script src="../scripts/HTMLInclude.js"></script>
</body>


</html>
